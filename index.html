<!DOCTYPE html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propriedade D: Simulador de Frequência</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <script src="script.js" defer></script>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <h1>Lançador de Dado</h1>

            <form id="form">
                <div class="input-group">
                    <label for="qtdLancamentos">Total de Lançamentos</label>
                    <input type="number" id="qtdLancamentos" value="1000" min="2">
                </div>
                <div class="input-group">
                    <label for="intervaloLancamentos">Intervalo (Eixo X)</label>
                    <input type="number" id="intervaloLancamentos" value="50" min="1">
                </div>
                <div class="input-group checkbox-group">
                    <input type="checkbox" id="checkSeparar" onchange="alternarVisualizacao()">
                    <label for="checkSeparar">Visulização Separada</label>
                </div>
                <div class="button-group">
                    <button type="button" class="btn-primary" onclick="iniciarLancamentos()">Lançar Dado</button>
                    <button type="button" class="btn-secondary" id="limparBtn"
                        onclick="limparGraficos()">Limpar</button>
                </div>
            </form>

            <div class="explanation-box">
                <h3>O que é a Propriedade D?</h3>
                <p>Também conhecida como <strong>Lei dos Grandes Números</strong>, ela afirma que conforme aumentamos o
                    número de experimentos, a frequência relativa de um evento (que face cai do dado) tende a se aproximar da
                    sua probabilidade teórica (1/6 ou (~16,6%)).</p>
            </div>
        </aside>

        <main class="main-content">
            <div class="dice-animation-area">
                <div class="dice">
                    <i id="dice-icon" class="fa-solid fa-dice-one"></i>
                </div>
            </div>

            <div id="containerJunto" class="chart-container">
                <canvas id="graficoJunto"></canvas>
            </div>

            <div id="containerSeparado" style="display: none;">
                <div class="grid-graficos">
                    <div class="chart-container-mini"><canvas id="graficoFace1"></canvas></div>
                    <div class="chart-container-mini"><canvas id="graficoFace2"></canvas></div>
                    <div class="chart-container-mini"><canvas id="graficoFace3"></canvas></div>
                    <div class="chart-container-mini"><canvas id="graficoFace4"></canvas></div>
                    <div class="chart-container-mini"><canvas id="graficoFace5"></canvas></div>
                    <div class="chart-container-mini"><canvas id="graficoFace6"></canvas></div>
                </div> 
            </div>
        </main>
    </div>
</body>
